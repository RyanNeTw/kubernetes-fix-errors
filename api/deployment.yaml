apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: broken-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: python:3.9-slim
        command: ["python", "-m", "http.server", "5000"]
        envFrom:
        - configMapRef:
            name: api-config
        ports:
        - containerPort: 5000
        
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
